services:
    email-api:
      container_name: email-api
      # Crea la imagen con el archivo Dockerfile de esta misma carpeta
      image: email:prd
      build: .
      restart: always
      volumes:
        - ./app:/home/jonnattan/app
      ports:
        - "8070:8070"
      env_file:
        - ../envs/file_email.env
      networks:
        - db-net
      #command: tail -f /home/jonnattan/requirements.txt
networks:
  db-net:
